name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm audit --audit-level=high

  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v7
      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          # --skip-git was removed in osv-scanner v2 (git commits are no
          # longer scanned by default)
          scan-args: |-
            --recursive
            ./

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lockfile-freshness:
    name: Lockfile age
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check lockfile age
        run: |
          for lock in package-lock.json; do
            [ -f "$lock" ] || continue
            AGE=$(( ( $(date +%s) - $(git log -1 --format=%ct -- "$lock") ) / 86400 ))
            if [ "$AGE" -gt 90 ]; then
              echo "::error file=$lock::$lock not refreshed in $AGE days -> run 'npm install' to refresh it"
              exit 1
            elif [ "$AGE" -gt 60 ]; then
              echo "::warning file=$lock::$lock is $AGE days old"
            fi
          done

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
