name: Bug Report
description: Report a bug in apexcharts-card
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report.
  - type: checkboxes
    id: preflight
    attributes:
      label: Checklist
      options:
        - label: I updated the card to the latest version available
          required: true
        - label: I cleared my browser cache
          required: true
        - label: I searched existing issues for a duplicate
          required: true
  - type: input
    id: card-version
    attributes:
      label: Version of the card
      placeholder: e.g. 2.2.3
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.7.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happens? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Card configuration
      description: The YAML configuration you used (redact any secrets).
      render: yaml
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Browser console logs
      render: shell
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
