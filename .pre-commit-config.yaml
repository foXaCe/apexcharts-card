# pre-commit.ci runs in a sandbox without Node/npm, so the local prettier &
# eslint hooks (run locally via prek and in the CI workflow) are skipped there.
ci:
  autoupdate_schedule: quarterly
  skip: [prettier, eslint]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        exclude: ^test/
      - id: check-json
        exclude: ^\.vscode/
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [ts, javascript, json, yaml, markdown, css]
        exclude: ^(package-lock\.json|CHANGELOG\.md|dist/)
      - id: eslint
        name: eslint
        entry: npx eslint --fix
        language: system
        files: ^src/.*\.ts$
